<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강체력증진실 입실 관리</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: #F4F6F8;
      color: #2C3E50;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    h1 { font-size: 20px; border-bottom: 2px solid #27AE60; padding-bottom: 10px; }
    h2 { font-size: 16px; color: #2C3E50; margin-top: 32px; }
    .card {
      background: #fff;
      border: 1px solid #E0E4E8;
      border-radius: 10px;
      padding: 20px;
      margin-top: 12px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2C3E50;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #CBD3D9;
      border-radius: 6px;
      font-size: 14px;
      color: #2C3E50;
    }
    .field input:focus {
      outline: none;
      border-color: #27AE60;
    }
    .minute-options { display: flex; gap: 8px; }
    .minute-btn {
      flex: 1;
      padding: 10px 0;
      border: 1px solid #CBD3D9;
      border-radius: 6px;
      background: #fff;
      color: #2C3E50;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .minute-btn.selected {
      background: #27AE60;
      border-color: #27AE60;
      color: #fff;
    }
    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px 0;
      border: none;
      border-radius: 6px;
      background: #27AE60;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:disabled { background: #A9DFBF; cursor: not-allowed; }
    .checkout-btn {
      padding: 6px 14px;
      border: 1px solid #27AE60;
      border-radius: 6px;
      background: #fff;
      color: #27AE60;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      margin: 16px 0;
      font-weight: 600;
    }
    .status.ok { background: #E8F8EF; color: #1E8449; }
    .status.err { background: #FDEDEC; color: #C0392B; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #E0E4E8; font-size: 14px; }
    th { background: #2C3E50; color: #fff; }
    tr:nth-child(even) { background: #fff; }
    .hint { font-size: 13px; color: #7F8C8D; margin-top: 24px; }
    code { background: #ECF0F1; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🏋️ 건강체력증진실 입실 관리</h1>

  <h2>입실 등록</h2>
  <div class="card">
    <div class="field">
      <label for="nameInput">이름</label>
      <input type="text" id="nameInput" placeholder="이름을 입력하세요">
    </div>
    <div class="field">
      <label for="phoneInput">전화번호</label>
      <input type="tel" id="phoneInput" placeholder="010-0000-0000">
    </div>
    <div class="field">
      <label for="emailInput">이메일</label>
      <input type="email" id="emailInput" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>예상 운동시간</label>
      <div class="minute-options">
        <button type="button" class="minute-btn" data-minutes="30">30분</button>
        <button type="button" class="minute-btn" data-minutes="60">60분</button>
        <button type="button" class="minute-btn" data-minutes="90">90분</button>
        <button type="button" class="minute-btn" data-minutes="120">120분</button>
      </div>
    </div>
    <button type="button" id="checkinBtn" class="submit-btn">입실</button>
    <div id="checkinMsg" class="status" style="display:none;"></div>
  </div>

  <h2>현재 현황</h2>
  <div id="status" class="status">연결 시도 중...</div>
  <div id="result"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://mewbkaeakktgknwounqc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_HK_iVznXT4dJYjZtOBcLQg_ppxaMY_A";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    async function loadData() {
      try {
        const { data, error } = await supabaseClient
          .from("checkins")
          .select("id, name, phone, expected_minutes, created_at, status, checkout_at")
          .eq("status", "운동중")
          .order("created_at", { ascending: false });

        if (error) throw error;

        statusEl.className = "status ok";
        statusEl.textContent = "✅ 현재 운동중인 인원 " + data.length + "명";

        if (data.length === 0) {
          resultEl.innerHTML = "<p>현재 운동중인 인원이 없습니다.</p>";
          return;
        }
        let html = "<table><tr><th>이름</th><th>전화번호</th><th>예상시간</th><th>입실시각</th><th></th></tr>";
        data.forEach(row => {
          const time = new Date(row.created_at).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
          html += "<tr>"
            + "<td>" + row.name + "</td>"
            + "<td>" + row.phone + "</td>"
            + "<td>" + row.expected_minutes + "분</td>"
            + "<td>" + time + "</td>"
            + "<td><button type=\"button\" class=\"checkout-btn\" data-id=\"" + row.id + "\">퇴실</button></td>"
            + "</tr>";
        });
        html += "</table>";
        resultEl.innerHTML = html;

      } catch (e) {
        statusEl.className = "status err";
        statusEl.textContent = "❌ 연결 실패: " + e.message;
        resultEl.innerHTML = "<p class='hint'>URL/키가 맞는지, 테이블 이름이 checkins인지 확인해보세요.</p>";
      }
    }

    // ---- 퇴실 처리 ----
    resultEl.addEventListener("click", async (e) => {
      const btn = e.target.closest(".checkout-btn");
      if (!btn) return;

      const id = btn.dataset.id;
      btn.disabled = true;
      try {
        const { error } = await supabaseClient
          .from("checkins")
          .update({
            checkout_at: new Date().toISOString(),
            status: "정상퇴실"
          })
          .eq("id", id);

        if (error) throw error;

        loadData();
      } catch (err) {
        alert("퇴실 처리 중 오류가 발생했습니다: " + err.message);
        btn.disabled = false;
      }
    });

    // ---- 입실 등록 ----
    const nameInput = document.getElementById("nameInput");
    const phoneInput = document.getElementById("phoneInput");
    const emailInput = document.getElementById("emailInput");
    const checkinBtn = document.getElementById("checkinBtn");
    const checkinMsg = document.getElementById("checkinMsg");
    const minuteButtons = document.querySelectorAll(".minute-btn");
    let selectedMinutes = null;

    // 마지막으로 입력한 이름/전화번호/이메일을 기억해서 다음 방문 때 자동으로 채워줌
    const REMEMBER_KEY = "gymSafetyLastCheckin";
    try {
      const saved = JSON.parse(localStorage.getItem(REMEMBER_KEY) || "{}");
      if (saved.name) nameInput.value = saved.name;
      if (saved.phone) phoneInput.value = saved.phone;
      if (saved.email) emailInput.value = saved.email;
    } catch (e) { /* 저장된 값이 없거나 손상된 경우 무시 */ }

    function rememberCheckinInfo(name, phone, email) {
      localStorage.setItem(REMEMBER_KEY, JSON.stringify({ name, phone, email }));
    }

    minuteButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        minuteButtons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedMinutes = parseInt(btn.dataset.minutes, 10);
      });
    });

    function showCheckinMsg(type, text) {
      checkinMsg.style.display = "block";
      checkinMsg.className = "status " + type;
      checkinMsg.textContent = text;
    }

    checkinBtn.addEventListener("click", async () => {
      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const email = emailInput.value.trim();

      if (!name || !phone || !email || !selectedMinutes) {
        showCheckinMsg("err", "이름, 전화번호, 이메일, 예상 운동시간을 모두 입력해주세요.");
        return;
      }

      checkinBtn.disabled = true;
      try {
        // 미퇴실 감지 시 본인 확인 이메일 링크에 쓸 무작위 토큰
        // (다른 사람이 다른 사람의 확인 링크를 추측할 수 없게 하기 위함)
        const confirmToken = crypto.randomUUID();

        const { error } = await supabaseClient
          .from("checkins")
          .insert({
            name,
            phone,
            email,
            expected_minutes: selectedMinutes,
            status: "운동중",
            confirm_token: confirmToken
          });

        if (error) throw error;

        showCheckinMsg("ok", "입실되었습니다.");
        rememberCheckinInfo(name, phone, email);
        nameInput.value = name;
        phoneInput.value = phone;
        emailInput.value = email;
        selectedMinutes = null;
        minuteButtons.forEach(b => b.classList.remove("selected"));

        loadData();
      } catch (e) {
        showCheckinMsg("err", "입실 처리 중 오류가 발생했습니다: " + e.message);
      } finally {
        checkinBtn.disabled = false;
      }
    });

    // ---- 본인 확인 링크 처리 ----
    // 이메일의 확인 링크(?confirm=id&token=...)를 열면 confirmed_at을 채워
    // 미퇴실 감지 서버 함수가 비상연락 단계로 넘어가지 않게 함.
    async function handleConfirmLink() {
      const params = new URLSearchParams(window.location.search);
      const confirmId = params.get("confirm");
      const token = params.get("token");
      if (!confirmId || !token) return;

      try {
        const { data, error } = await supabaseClient
          .from("checkins")
          .update({ confirmed_at: new Date().toISOString() })
          .eq("id", confirmId)
          .eq("confirm_token", token)
          .is("confirmed_at", null)
          .select("id");

        if (error) throw error;

        if (data && data.length > 0) {
          alert("확인되었습니다. 안전하게 계속 운동하세요!");
        } else {
          alert("이미 확인되었거나 유효하지 않은 링크입니다.");
        }
      } catch (e) {
        alert("확인 처리 중 오류가 발생했습니다: " + e.message);
      }

      // 새로고침 시 같은 요청이 반복되지 않도록 URL에서 파라미터 제거
      params.delete("confirm");
      params.delete("token");
      const newUrl = window.location.pathname + (params.toString() ? "?" + params.toString() : "");
      window.history.replaceState({}, "", newUrl);
    }

    handleConfirmLink().then(loadData);
  </script>
</body>
</html>
