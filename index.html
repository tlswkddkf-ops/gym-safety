<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase 연결 테스트</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: #F4F6F8;
      color: #2C3E50;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    h1 { font-size: 20px; border-bottom: 2px solid #27AE60; padding-bottom: 10px; }
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      margin: 16px 0;
      font-weight: 600;
    }
    .status.ok { background: #E8F8EF; color: #1E8449; }
    .status.err { background: #FDEDEC; color: #C0392B; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #E0E4E8; font-size: 14px; }
    th { background: #2C3E50; color: #fff; }
    tr:nth-child(even) { background: #fff; }
    .hint { font-size: 13px; color: #7F8C8D; margin-top: 24px; }
    code { background: #ECF0F1; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🏋️ Supabase 연결 테스트</h1>
  <div id="status" class="status">연결 시도 중...</div>
  <div id="result"></div>

  <p class="hint">
    이 파일을 열기 전에, 아래 코드의 <code>SUPABASE_URL</code>과
    <code>SUPABASE_ANON_KEY</code>를 본인 값으로 바꿔야 합니다.
  </p>

  <!-- Supabase 라이브러리 불러오기 (인터넷에서 자동으로 가져옴) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ▼▼▼ 여기 두 줄을 본인 값으로 바꾸세요 ▼▼▼
    const SUPABASE_URL = "https://mewbkaeakktgknwounqc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_HK_iVznXT4dJYjZtOBcLQg_ppxaMY_A";
    // ▲▲▲ 위 두 줄만 바꾸면 됩니다 ▲▲▲

    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    async function loadData() {
      try {
        // Supabase에 연결선 만들기
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // checkins 테이블에서 전부 가져오기
        const { data, error } = await supabase
          .from("checkins")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) throw error;

        // 성공 표시
        statusEl.className = "status ok";
        statusEl.textContent = "✅ 연결 성공! 데이터 " + data.length + "건을 불러왔습니다.";

        // 표로 그리기
        if (data.length === 0) {
          resultEl.innerHTML = "<p>테이블에 데이터가 없습니다.</p>";
          return;
        }
        let html = "<table><tr>";
        Object.keys(data[0]).forEach(k => html += "<th>" + k + "</th>");
        html += "</tr>";
        data.forEach(row => {
          html += "<tr>";
          Object.values(row).forEach(v => html += "<td>" + (v === null ? "-" : v) + "</td>");
          html += "</tr>";
        });
        html += "</table>";
        resultEl.innerHTML = html;

      } catch (e) {
        statusEl.className = "status err";
        statusEl.textContent = "❌ 연결 실패: " + e.message;
        resultEl.innerHTML = "<p class='hint'>URL/키가 맞는지, 테이블 이름이 checkins인지 확인해보세요.</p>";
      }
    }

    loadData();
  </script>
</body>
</html>
