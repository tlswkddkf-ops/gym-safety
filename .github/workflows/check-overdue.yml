name: Check overdue gym check-ins

on:
  workflow_dispatch:
  # Scheduled runs now happen via Supabase pg_cron (see cron.job in the DB),
  # which is far more reliable than GitHub Actions' scheduler at 5-min
  # intervals. This workflow is kept for manual testing only, to avoid
  # firing the same check twice.

jobs:
  check-overdue:
    runs-on: ubuntu-latest
    steps:
      - name: Call check-overdue API
        run: |
          curl -sf -X GET "https://gym-safety.vercel.app/api/check-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
